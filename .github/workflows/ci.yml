name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .
      - name: Type check (mypy)
        run: mypy qiskit_migration
        continue-on-error: true
      - name: Unit tests
        run: pytest -q
      - name: RAG eval gate (offline, seed-only)
        run: python -m qiskit_migration.eval.run_eval --seed-only --min-recall 0.9

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: |
          docker build -f Dockerfile.api -t qiskit-migration-api:ci .
          docker build -f Dockerfile.worker -t qiskit-migration-worker:ci .
          docker build -f Dockerfile.sandbox -t qiskit-migration-sandbox:ci .
