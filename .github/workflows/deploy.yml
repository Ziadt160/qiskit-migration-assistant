name: Deploy

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push images
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ env.REGISTRY }}/${{ github.repository }}"
          for svc in api worker sandbox; do
            docker build -f Dockerfile.$svc -t "$REPO-$svc:$TAG" -t "$REPO-$svc:latest" .
            docker push "$REPO-$svc:$TAG"
            docker push "$REPO-$svc:latest"
          done
      - name: Deploy over SSH (compose pull + up on the VM)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/qiskit-migration
            docker compose pull
            docker compose up -d
            docker image prune -f
